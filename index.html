<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c14">
<title>AIGC Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ROOT & TOKENS
═══════════════════════════════════════ */
:root {
  --bg:       #080c14;
  --bg2:      #0f1520;
  --bg3:      #161e2e;
  --glass:    rgba(255,255,255,0.04);
  --border:   rgba(255,255,255,0.08);
  --t1:       #f0f4ff;
  --t2:       #7a8aaa;
  --t3:       #3a4a6a;
  --acc:      #4f8ef7;
  --jimeng:   #06b6d4;
  --mj:       #4f8ef7;
  --banana:   #f59e0b;
  --safe-t:   env(safe-area-inset-top);
  --safe-b:   env(safe-area-inset-bottom);
  --tab-h:    60px;
  --header-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--t1);
  font-family: 'DM Sans', system-ui, sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════ */
.app {
  display: flex; flex-direction: column;
  height: 100%; width: 100%;
  position: relative;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding-top: var(--safe-t);
  background: rgba(8,12,20,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  height: var(--header-h);
}

.logo {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, #4f8ef7, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}

.header-title {
  font-size: 16px; font-weight: 600; letter-spacing: -0.3px;
  flex: 1;
}

.header-btn {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--glass); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: background 0.2s;
}
.header-btn:active { background: rgba(255,255,255,0.1); }
.header-btn svg { width: 18px; height: 18px; stroke: var(--t2); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* Source tabs */
.source-tabs {
  display: flex; gap: 6px;
  padding: 0 16px 10px;
  overflow-x: auto; scrollbar-width: none;
}
.source-tabs::-webkit-scrollbar { display: none; }

.src-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--t2); cursor: pointer;
  white-space: nowrap; transition: all 0.2s;
  flex-shrink: 0;
}
.src-tab.active-all      { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); color: var(--t1); }
.src-tab.active-jimeng   { background: rgba(6,182,212,0.15);  border-color: rgba(6,182,212,0.3);   color: var(--jimeng); }
.src-tab.active-mj       { background: rgba(79,142,247,0.15); border-color: rgba(79,142,247,0.3);  color: var(--mj); }
.src-tab.active-banana   { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.3);  color: var(--banana); }
.src-dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-jimeng  { background: var(--jimeng); }
.dot-mj      { background: var(--mj); }
.dot-banana  { background: var(--banana); }

/* ═══════════════════════════════════════
   PAGES
═══════════════════════════════════════ */
.pages { flex: 1; position: relative; }

.page {
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: none;
}
.page.active { display: block; }

/* scroll padding */
.page-home   { padding-top: calc(var(--safe-t) + var(--header-h) + 46px); padding-bottom: calc(var(--tab-h) + var(--safe-b) + 16px); }
.page-boards { padding-top: calc(var(--safe-t) + var(--header-h) - 46px + 16px); padding-bottom: calc(var(--tab-h) + var(--safe-b) + 16px); }
.page-settings { padding-top: calc(var(--safe-t) + var(--header-h) - 46px + 16px); padding-bottom: calc(var(--tab-h) + var(--safe-b) + 16px); }

/* ═══════════════════════════════════════
   MASONRY GRID
═══════════════════════════════════════ */
.masonry {
  columns: 2; column-gap: 6px;
  padding: 0 6px;
}

.card {
  break-inside: avoid; margin-bottom: 6px;
  border-radius: 12px; overflow: hidden;
  position: relative; cursor: pointer;
  background: var(--bg3);
  transform: translateZ(0);
  transition: transform 0.15s;
}
.card:active { transform: scale(0.97); }

.card img {
  width: 100%; display: block;
  object-fit: cover; min-height: 80px;
  background: var(--bg3);
}

.card-stripe {
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
}
.stripe-jimeng   { background: var(--jimeng); }
.stripe-midjourney { background: var(--mj); }
.stripe-nanobanana { background: var(--banana); }

.card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
  padding: 24px 8px 8px;
}

.card-prompt {
  font-size: 10px; line-height: 1.4;
  color: rgba(255,255,255,0.8);
  font-family: 'DM Mono', monospace;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.video-badge {
  position: absolute; top: 6px; right: 6px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
}
.video-badge svg { width: 10px; height: 10px; fill: #fff; }

/* ═══════════════════════════════════════
   EMPTY / LOADING
═══════════════════════════════════════ */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 40px; gap: 12px; text-align: center;
}
.empty-icon { font-size: 40px; opacity: 0.3; }
.empty-title { font-size: 16px; font-weight: 500; color: var(--t2); }
.empty-sub { font-size: 13px; color: var(--t3); line-height: 1.6; }

.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--bg2) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 12px; margin-bottom: 6px; break-inside: avoid;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ═══════════════════════════════════════
   SEARCH OVERLAY
═══════════════════════════════════════ */
.search-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(8,12,20,0.97);
  backdrop-filter: blur(20px);
  display: flex; flex-direction: column;
  padding-top: var(--safe-t);
  transform: translateY(-100%);
  transition: transform 0.3s cubic-bezier(0.19,1,0.22,1);
}
.search-overlay.open { transform: translateY(0); }

.search-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
}
.search-input-wrap {
  flex: 1; display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px;
}
.search-input-wrap svg { width: 16px; height: 16px; stroke: var(--t3); fill: none; stroke-width: 2; stroke-linecap: round; flex-shrink: 0; }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--t1); font-family: inherit; font-size: 15px;
}
.search-input::placeholder { color: var(--t3); }
.search-cancel {
  color: var(--acc); font-size: 14px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
}

.search-results {
  flex: 1; overflow-y: auto; padding: 0 16px 16px;
  -webkit-overflow-scrolling: touch;
}
.search-results .masonry { padding: 0; }

/* ═══════════════════════════════════════
   FILTER SHEET
═══════════════════════════════════════ */
.sheet-bg {
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.6);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.sheet-bg.open { opacity: 1; pointer-events: auto; }

.filter-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 160;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding: 0 20px calc(20px + var(--safe-b));
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.19,1,0.22,1);
  max-height: 75vh; overflow-y: auto;
}
.filter-sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--t3); margin: 12px auto 16px;
}
.sheet-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }

.filter-section { margin-bottom: 20px; }
.filter-lbl {
  font-size: 10px; font-weight: 600; color: var(--t3);
  letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px;
}
.filter-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px;
  border: 1px solid var(--border); background: var(--glass);
  color: var(--t2); cursor: pointer; transition: all 0.2s;
}
.chip.active { background: rgba(79,142,247,0.15); border-color: rgba(79,142,247,0.4); color: var(--acc); }

.sheet-footer {
  display: flex; gap: 10px; margin-top: 20px;
  padding-top: 16px; border-top: 1px solid var(--border);
}
.btn-reset {
  flex: 1; padding: 13px; border-radius: 12px;
  background: var(--glass); border: 1px solid var(--border);
  color: var(--t2); font-family: inherit; font-size: 14px;
  cursor: pointer;
}
.btn-apply {
  flex: 2; padding: 13px; border-radius: 12px;
  background: var(--acc); border: none;
  color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer;
}

/* ═══════════════════════════════════════
   BOARDS PAGE
═══════════════════════════════════════ */
.boards-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 16px;
}
.board-card {
  border-radius: 14px; overflow: hidden;
  background: var(--bg3); cursor: pointer;
  transition: transform 0.15s; position: relative;
}
.board-card:active { transform: scale(0.97); }
.board-cover {
  height: 100px; background: var(--bg2);
  display: flex; gap: 2px;
}
.cover-main { flex: 2; overflow: hidden; }
.cover-side { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.cover-sm { flex: 1; overflow: hidden; }
.cover-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.board-info { padding: 10px 12px; }
.board-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.board-count { font-size: 11px; color: var(--t2); }

/* ═══════════════════════════════════════
   SETTINGS PAGE
═══════════════════════════════════════ */
.settings-wrap { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

.setting-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.setting-header {
  padding: 14px 16px 10px;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--t3);
}
.setting-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-top: 1px solid var(--border);
}
.setting-row:first-of-type { border-top: none; }
.setting-info { flex: 1; }
.setting-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.setting-desc { font-size: 11px; color: var(--t2); line-height: 1.4; }

.setting-inp {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--t1); font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 10px 12px; outline: none; margin-top: 8px;
}
.setting-inp:focus { border-color: rgba(79,142,247,0.5); }
.setting-inp::placeholder { color: var(--t3); }

.btn-sync {
  width: 100%; padding: 14px; border-radius: 12px;
  background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.3);
  color: var(--acc); font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.2s; margin-top: 4px;
}
.btn-sync:active { background: rgba(79,142,247,0.25); }
.btn-sync svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.btn-sync:disabled { opacity: 0.5; }

.sync-status {
  margin-top: 8px; padding: 10px 14px; border-radius: 10px;
  font-size: 12px; line-height: 1.5; display: none;
}
.sync-status.ok   { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; display: block; }
.sync-status.err  { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: #fca5a5; display: block; }
.sync-status.info { background: rgba(79,142,247,0.1);  border: 1px solid rgba(79,142,247,0.2);  color: #93c5fd; display: block; }

.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; border-top: 1px solid var(--border);
  font-size: 13px; color: var(--t2);
}
.stat-num { font-weight: 600; color: var(--t1); font-family: 'DM Mono', monospace; }
.stat-jimeng  { color: var(--jimeng); }
.stat-mj      { color: var(--mj); }
.stat-banana  { color: var(--banana); }

/* ═══════════════════════════════════════
   DETAIL OVERLAY
═══════════════════════════════════════ */
.detail-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: #000;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.19,1,0.22,1);
}
.detail-overlay.open { transform: translateY(0); }

.detail-top {
  position: absolute; top: 0; left: 0; right: 0;
  padding: calc(var(--safe-t) + 10px) 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
}

.detail-close {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.detail-close svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }

.detail-source-badge {
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
}
.badge-jimeng    { background: rgba(6,182,212,0.25);  color: var(--jimeng); }
.badge-midjourney { background: rgba(79,142,247,0.25); color: var(--mj); }
.badge-nanobanana { background: rgba(245,158,11,0.25); color: var(--banana); }

.detail-media {
  flex: 1; position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; background: #000;
}
.detail-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: block;
}
.detail-video {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: none;
}

.play-btn {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
  border: 2px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s;
}
.play-btn:active { background: rgba(255,255,255,0.25); }
.play-btn svg { width: 20px; height: 20px; fill: #fff; margin-left: 3px; }
.play-btn.hidden { display: none; }

.detail-sheet {
  background: rgba(10,14,22,0.98);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 16px 20px calc(16px + var(--safe-b));
  max-height: 55%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.detail-meta-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.detail-author {
  font-size: 13px; color: var(--t2); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.detail-version {
  font-size: 11px; color: var(--t3); font-family: 'DM Mono', monospace;
  background: var(--bg3); padding: 3px 8px; border-radius: 6px;
}

.detail-prompt {
  font-size: 13px; line-height: 1.7; color: rgba(255,255,255,0.75);
  font-family: 'DM Mono', monospace;
  margin-bottom: 16px; white-space: pre-wrap;
}

.detail-actions {
  display: flex; gap: 10px;
}
.detail-btn {
  flex: 1; padding: 12px 8px; border-radius: 12px;
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--t2); font-family: inherit; font-size: 12px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s;
}
.detail-btn:active { background: rgba(255,255,255,0.1); color: var(--t1); }
.detail-btn.pri { background: rgba(79,142,247,0.15); border-color: rgba(79,142,247,0.3); color: var(--acc); }
.detail-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.detail-params {
  margin-top: 12px; padding: 10px 12px; border-radius: 10px;
  background: rgba(79,142,247,0.06); border: 1px solid rgba(79,142,247,0.15);
  font-size: 11px; font-family: 'DM Mono', monospace; color: #93c5fd;
  line-height: 1.6; display: none;
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
.toast {
  position: fixed; bottom: calc(var(--tab-h) + var(--safe-b) + 16px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(20,28,44,0.95); border: 1px solid var(--border);
  color: var(--t1); font-size: 13px; padding: 10px 18px;
  border-radius: 20px; z-index: 500;
  opacity: 0; pointer-events: none;
  transition: all 0.3s cubic-bezier(0.19,1,0.22,1);
  white-space: nowrap; backdrop-filter: blur(10px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════
   TAB BAR
═══════════════════════════════════════ */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-b));
  background: rgba(8,12,20,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-around;
  padding-top: 8px; z-index: 100;
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 0 20px; color: var(--t3);
  transition: color 0.2s; flex: 1;
}
.tab-item.active { color: var(--t1); }
.tab-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.tab-label { font-size: 10px; font-weight: 500; }

/* Boards page header */
.page-inner-header {
  padding: calc(var(--safe-t) + var(--header-h) - 46px + 16px) 16px 12px;
  position: sticky; top: 0; z-index: 10;
}
.page-inner-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }

/* Scrollbar hidden */
* { scrollbar-width: none; }
*::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="logo">AI</div>
      <div class="header-title">AIGC Vault</div>
      <div class="header-btn" onclick="openSearch()">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="header-btn" onclick="openFilter()">

        复制提示词
      </button>
      <button class="detail-btn" onclick="openOriginal()">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        原链接

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let allData      = [];
let boards       = [];
let currentSrc   = 'all';
let currentBoard = null;   // null = 全部, string = 画板名
let displayLimit = 40;
let activeFilters = { version: new Set(), ratio: new Set(), tags: new Set() };
let pendingFilters = { version: new Set(), ratio: new Set(), tags: new Set() };
let currentItem  = null;
let isPlaying    = false;

const SOURCE_LABELS = { jimeng: '即梦', midjourney: 'MJ', nanobanana: 'Banana' };

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadConfig();
  const cached = sessionStorage.getItem('aigc_mobile_cache');
  if (cached) {
    try {
      const parsed = JSON.parse(cached);
      allData = parsed.data || [];
      boards  = parsed.boards || [];
      render();
      updateStats();
    } catch(e) {}
  }
});

// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
function loadConfig() {
  const cfg = JSON.parse(localStorage.getItem('aigc_mobile_cos') || '{}');
  if (cfg.bucket) document.getElementById('inp-bucket').value = cfg.bucket;
  if (cfg.region) document.getElementById('inp-region').value = cfg.region;
}

function saveConfig() {
  const bucket = document.getElementById('inp-bucket').value.trim();
  const region = document.getElementById('inp-region').value.trim();
  localStorage.setItem('aigc_mobile_cos', JSON.stringify({ bucket, region }));
  return { bucket, region };
}

// ═══════════════════════════════════════
// SYNC FROM COS
// ═══════════════════════════════════════
async function syncData() {
  const { bucket, region } = saveConfig();
  if (!bucket || !region) {
    showSyncStatus('⚠ 请填写 Bucket 名称和地域', 'err');
    return;
  }

  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;animation:spin 1s linear infinite"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.93"/></svg> 同步中…`;

  const style = document.createElement('style');
  style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
  document.head.appendChild(style);

  showSyncStatus('正在读取云端数据…', 'info');

  try {
    const url = `https://${bucket}.cos.${region}.myqcloud.com/unified_meta.json?t=${Date.now()}`;
    const res = await fetch(url);

    if (res.status === 403) throw new Error('访问被拒绝（403）。请将 unified_meta.json 设置为公有读，或检查 Bucket 名称是否正确。');
    if (res.status === 404) throw new Error('未找到数据文件（404）。请先在插件端执行「上传同步」操作。');
    if (!res.ok) throw new Error(`服务器错误：${res.status}`);

    const json = await res.json();
    allData = (json.data || []).map(normalizeItem);
    boards  = json.boards || [...new Set(allData.map(i => i.board).filter(Boolean))];

    // 缓存到 sessionStorage
    sessionStorage.setItem('aigc_mobile_cache', JSON.stringify({ data: allData, boards }));

    render();
    renderBoards();
    updateStats();

    showSyncStatus(`✅ 同步完成！共 ${allData.length} 条记录`, 'ok');
  } catch(e) {
    showSyncStatus('❌ ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.93"/></svg> 同步数据`;
  }
}

function normalizeItem(item) {
  return {
    ...item,
    id:         String(item.id || ''),
    imageUrl:   item.thumbBlobBase64 || item.cosThumbUrl || item.cosUrl || item.imageUrl || item.localThumb || item.mainImage || '',
    promptText: item.promptText || item.prompt || '',
    metaVersion:item.metaVersion || item.version || '',
    arType:     item.arType || item.ratio || '',
    author:     item.author || item.authorName || '',
    tags:       Array.isArray(item.tags) ? item.tags : [],
    source:     item.source || 'jimeng',
    videoUrl:   item.videoUrl || '',
    originalUrl:item.originalUrl || item.url || '',
  };
}

function showSyncStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-status ' + type;
}

function updateStats() {
  const j = allData.filter(i => i.source === 'jimeng').length;
  const m = allData.filter(i => i.source === 'midjourney').length;
  const b = allData.filter(i => i.source === 'nanobanana').length;
  const v = allData.filter(i => i.videoUrl).length;
  document.getElementById('stat-total').textContent  = allData.length;
  document.getElementById('stat-jimeng').textContent = j;
  document.getElementById('stat-mj').textContent     = m;
  document.getElementById('stat-banana').textContent = b;
  document.getElementById('stat-video').textContent  = v;
  document.getElementById('statsCard').style.display = allData.length ? '' : 'none';
}

// ═══════════════════════════════════════
// FILTERING
// ═══════════════════════════════════════
function getFilteredData() {
  let data = allData;

  // Source filter
  if (currentSrc !== 'all') data = data.filter(i => i.source === currentSrc);

  // Board filter
  if (currentBoard) data = data.filter(i => i.board === currentBoard);

  // Active filters
  if (activeFilters.version.size) data = data.filter(i => activeFilters.version.has(i.metaVersion));
  if (activeFilters.ratio.size)   data = data.filter(i => activeFilters.ratio.has(i.arType));
  if (activeFilters.tags.size)    data = data.filter(i => (i.tags||[]).some(t => activeFilters.tags.has(t)));

  return data;
}

// ═══════════════════════════════════════
// RENDER GALLERY
// ═══════════════════════════════════════
function render() {
  const data = getFilteredData();
  const masonry = document.getElementById('masonry');
  const empty   = document.getElementById('emptyState');

  if (data.length === 0) {
    masonry.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  const visible = data.slice(0, displayLimit);
  masonry.innerHTML = visible.map((item, idx) => cardHTML(item, idx)).join('');
}

function cardHTML(item, idx) {
  const src = item.imageUrl;
  const isVideo = !!item.videoUrl;
  const sourceClass = `stripe-${item.source}`;

  return `
    <div class="card" onclick="openDetail(${idx})">
      <div class="card-stripe ${sourceClass}"></div>
      ${src ? `<img src="${escH(src)}" loading="lazy" onerror="this.style.display='none'">` : `<div style="height:140px;background:var(--bg3)"></div>`}
      ${isVideo ? `<div class="video-badge"><svg viewBox="0 0 24 24" fill="white" width="10" height="10"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>` : ''}
      <div class="card-overlay">
        <div class="card-prompt">${escH(item.promptText || item.title || '')}</div>
      </div>
    </div>
  `;
}

function onHomeScroll(el) {
  const { scrollTop, scrollHeight, clientHeight } = el;
  if (scrollTop + clientHeight >= scrollHeight - 600) {
    const data = getFilteredData();
    if (displayLimit < data.length) {
      displayLimit += 40;
      render();
    }
  }
}

// ═══════════════════════════════════════
// RENDER BOARDS
// ═══════════════════════════════════════
function renderBoards() {
  const grid = document.getElementById('boardsGrid');
  if (!boards.length) { grid.innerHTML = ''; return; }

  grid.innerHTML = boards.map(board => {
    const items = allData.filter(i => i.board === board);
    const imgs  = items.slice(0, 3).map(i => i.imageUrl).filter(Boolean);
    return `
      <div class="board-card" onclick="filterByBoard('${escH(board)}')">
        <div class="board-cover">
          <div class="cover-main">${imgs[0] ? `<img class="cover-img" src="${escH(imgs[0])}" loading="lazy">` : ''}</div>
          <div class="cover-side">
            <div class="cover-sm">${imgs[1] ? `<img class="cover-img" src="${escH(imgs[1])}" loading="lazy">` : ''}</div>
            <div class="cover-sm">${imgs[2] ? `<img class="cover-img" src="${escH(imgs[2])}" loading="lazy">` : ''}</div>
          </div>
        </div>
        <div class="board-info">
          <div class="board-name">${escH(board)}</div>
          <div class="board-count">${items.length} 个采集</div>
        </div>
      </div>
    `;
  }).join('');
}

function filterByBoard(board) {
  currentBoard = board;
  displayLimit = 40;
  switchTab('home');
  render();
}

// ═══════════════════════════════════════
// SOURCE TABS
// ═══════════════════════════════════════
function setSource(src) {
  currentSrc   = src;
  currentBoard = null;
  displayLimit = 40;

  document.querySelectorAll('.src-tab').forEach(el => {
    el.className = 'src-tab';
    if (el.dataset.src === src) {
      el.classList.add('active-' + (src === 'all' ? 'all' : src === 'midjourney' ? 'mj' : src));
    }
  });

  render();
}

// ═══════════════════════════════════════
// DETAIL
// ═══════════════════════════════════════
function openDetail(idx) {
  const data = getFilteredData();
  const item = data[idx];
  if (!item) return;
  currentItem = item;
  isPlaying   = false;

  // Badge
  const badge = document.getElementById('detailBadge');
  badge.textContent = SOURCE_LABELS[item.source] || item.source;
  badge.className = `detail-source-badge badge-${item.source}`;

  // Media
  const img   = document.getElementById('detailImg');
  const video = document.getElementById('detailVideo');
  const playBtn = document.getElementById('playBtn');

  img.src = item.imageUrl || '';
  video.src = '';
  video.style.display = 'none';
  img.style.display = 'block';

  if (item.videoUrl) {
    playBtn.classList.remove('hidden');
  } else {
    playBtn.classList.add('hidden');
  }

  // Meta
  document.getElementById('detailAuthor').textContent = item.author ? `@${item.author}` : '';
  document.getElementById('detailVersion').textContent = [item.metaVersion, item.arType].filter(Boolean).join(' · ');
  document.getElementById('detailPrompt').textContent = item.promptText || item.title || '—';

  // MJ params
  const paramsEl = document.getElementById('detailParams');
  if (item.paramsText) {
    paramsEl.textContent = item.paramsText;
    paramsEl.style.display = 'block';
  } else {
    paramsEl.style.display = 'none';
  }

  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  const video = document.getElementById('detailVideo');
  video.pause();
  video.src = '';
  isPlaying = false;
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function playVideo() {
  if (!currentItem?.videoUrl) return;
  const img   = document.getElementById('detailImg');
  const video = document.getElementById('detailVideo');
  const playBtn = document.getElementById('playBtn');

  video.src = currentItem.videoUrl;
  video.style.display = 'block';
  img.style.display   = 'none';
  playBtn.classList.add('hidden');
  video.play();
  isPlaying = true;
}

function copyDetailPrompt() {
  if (!currentItem) return;
  const text = [currentItem.promptText || currentItem.title || '', currentItem.paramsText || ''].join(' ').trim();
  navigator.clipboard.writeText(text).then(() => showToast('📋 已复制提示词'));
}

function openOriginal() {
  if (currentItem?.originalUrl) window.open(currentItem.originalUrl, '_blank');
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(() => document.getElementById('searchInput').focus(), 300);
}

function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchMasonry').innerHTML = '';
}

function onSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const masonry = document.getElementById('searchMasonry');
  if (!q) { masonry.innerHTML = ''; return; }

  const results = allData.filter(item => {
    const hay = [item.promptText, item.title, item.author, ...(item.tags || [])].join(' ').toLowerCase();
    return hay.includes(q);
  }).slice(0, 40);

  masonry.innerHTML = results.map((item, idx) => {
    const src = item.imageUrl;
    const isVideo = !!item.videoUrl;
    const sourceClass = `stripe-${item.source}`;
    return `
      <div class="card" onclick="openDetailFromSearch(${allData.indexOf(item)})">
        <div class="card-stripe ${sourceClass}"></div>
        ${src ? `<img src="${escH(src)}" loading="lazy" onerror="this.style.display='none'">` : `<div style="height:120px;background:var(--bg3)"></div>`}
        ${isVideo ? `<div class="video-badge"><svg viewBox="0 0 24 24" fill="white" width="10" height="10"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>` : ''}
        <div class="card-overlay">
          <div class="card-prompt">${escH(item.promptText || item.title || '')}</div>
        </div>
      </div>
    `;
  }).join('');
}

function openDetailFromSearch(realIdx) {
  closeSearch();
  const item = allData[realIdx];
  if (!item) return;
  // find index in filtered
  const filtered = getFilteredData();
  const idx = filtered.indexOf(item);
  if (idx >= 0) openDetail(idx);
  else { currentItem = item; openDetail(0); }
}

// ═══════════════════════════════════════
// FILTER
// ═══════════════════════════════════════
function openFilter() {
  // Build filter options from current source data
  const data = currentSrc === 'all' ? allData : allData.filter(i => i.source === currentSrc);

  const versions = [...new Set(data.map(i => i.metaVersion).filter(Boolean))].sort();
  const ratios   = [...new Set(data.map(i => i.arType).filter(Boolean).filter(r => /\d+:\d+/.test(r)))].sort();
  const versionSet = new Set(versions);
  const arSet = new Set(['landscape','portrait','square','横板','竖版','方板','16:9','9:16','1:1','4:3','3:4']);
  const tags = [...new Set(data.flatMap(i => (i.tags||[]).filter(t => !versionSet.has(t) && !arSet.has(t))))].sort().slice(0, 30);

  // Copy active to pending
  pendingFilters = {
    version: new Set(activeFilters.version),
    ratio:   new Set(activeFilters.ratio),
    tags:    new Set(activeFilters.tags),
  };

  renderChips('chip-version', versions, 'version');
  renderChips('chip-ratio',   ratios,   'ratio');
  renderChips('chip-tags',    tags,     'tags');

  document.getElementById('filter-tags-section').style.display = tags.length ? '' : 'none';

  document.getElementById('sheetBg').classList.add('open');
  document.getElementById('filterSheet').classList.add('open');
}

function renderChips(containerId, values, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = values.map(v => `
    <div class="chip ${pendingFilters[type].has(v) ? 'active' : ''}" onclick="toggleChip(this,'${type}','${escH(v)}')">${escH(v)}</div>
  `).join('');
}

function toggleChip(el, type, val) {
  if (pendingFilters[type].has(val)) {
    pendingFilters[type].delete(val);
    el.classList.remove('active');
  } else {
    pendingFilters[type].add(val);
    el.classList.add('active');
  }
}

function applyFilter() {
  activeFilters = {
    version: new Set(pendingFilters.version),
    ratio:   new Set(pendingFilters.ratio),
    tags:    new Set(pendingFilters.tags),
  };
  displayLimit = 40;
  closeFilter();
  render();
}

function resetFilter() {
  pendingFilters = { version: new Set(), ratio: new Set(), tags: new Set() };
  document.querySelectorAll('.chip.active').forEach(c => c.classList.remove('active'));
}

function closeFilter() {
  document.getElementById('sheetBg').classList.remove('open');
  document.getElementById('filterSheet').classList.remove('open');
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');

  if (tab === 'boards') renderBoards();
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function escH(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Swipe down to close detail
let touchStartY = 0;
document.getElementById('detailOverlay').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('detailOverlay').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80) closeDetail();
}, { passive: true });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('searchOverlay').classList.contains('open')) closeSearch();
    else if (document.getElementById('filterSheet').classList.contains('open')) closeFilter();
    else if (document.getElementById('detailOverlay').classList.contains('open')) closeDetail();
  }
});
</script>
