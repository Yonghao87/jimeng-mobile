<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>AIGC Vault 移动画廊</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* --- 1. CSS 变量与主题定义 --- */
        :root {
            --bg-color: #f7f8fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #999999;
            --border-color: rgba(0,0,0,0.05);
            --nav-bg: rgba(255,255,255,0.95);
            --primary: #111111;
            --accent: #2563eb;
            --btn-bg: #111111;
            --btn-text: #ffffff;
            --btn-sub-bg: #f0f0f0;
            --btn-sub-text: #333333;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-top: env(safe-area-inset-top);
            --nav-height: 55px;
            /* 平台颜色 */
            --jimeng: #06b6d4;
            --mj: #4f8ef7;
            --banana: #f59e0b;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #777777;
            --border-color: #333333;
            --nav-bg: rgba(30,30,30,0.95);
            --primary: #ffffff;
            --accent: #4dabf7;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn-sub-bg: #333333;
            --btn-sub-text: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        i.ri-lg { font-size: 20px; }

        /* --- 2. 顶部导航 --- */
        .top-bar {
            height: 50px; background: var(--nav-bg); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 20; border-bottom: 1px solid var(--border-color);
            padding-top: var(--safe-top); font-weight: 700; font-size: 17px;
            padding-left: 15px; padding-right: 15px; transition: background 0.3s;
        }
        .top-left-btn, .top-right-group { position: absolute; top: calc(var(--safe-top) + 13px); display: flex; gap: 18px; }
        .top-left-btn { left: 15px; cursor: pointer; display: none; }
        .top-right-group { right: 15px; }
        .top-icon-btn { cursor: pointer; color: var(--text-main); font-size: 20px; }

        /* --- 3. 筛选面板 --- */
        .filter-panel {
            position: absolute; top: calc(50px + var(--safe-top)); left: 0; width: 100%;
            background: var(--card-bg); z-index: 19; padding: 0 20px 20px 20px;
            box-shadow: var(--shadow);
            transform: translateY(-150%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 70vh; overflow-y: auto; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
        }
        .filter-panel.open { transform: translateY(0); }
        .filter-title { font-size: 12px; color: var(--text-sub); margin: 20px 0 10px 0; font-weight: 600; text-transform: uppercase; }
        .filter-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .f-chip {
            padding: 6px 14px; background: var(--bg-color); border-radius: 20px; font-size: 12px;
            color: var(--text-main); cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .f-chip.active { background: var(--primary); color: var(--bg-color); }
        .mask-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 15; display: none; opacity: 0; transition: opacity 0.3s; }
        .mask-overlay.show { display: block; opacity: 1; }

        /* --- 4. 内容区 --- */
        .content-area {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 15px 15px calc(var(--nav-height) + var(--safe-bottom) + 40px) 15px;
            -webkit-overflow-scrolling: touch;
        }

        /* 瀑布流 */
        .waterfall { column-count: 2; column-gap: 12px; }
        .pin {
            break-inside: avoid; margin-bottom: 12px; background: var(--card-bg);
            border-radius: 12px; overflow: hidden; position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        /* 来源顶部条 */
        .pin-source-stripe { position: absolute; top: 0; left: 0; width: 100%; height: 3px; z-index: 2; }
        .stripe-jimeng { background: var(--jimeng); }
        .stripe-midjourney { background: var(--mj); }
        .stripe-nanobanana { background: var(--banana); }
        
        /* 视频角标 */
        .pin-video-badge {
            position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6);
            color: #fff; padding: 3px 6px; border-radius: 6px; font-size: 10px; font-weight: 600;
            display: flex; align-items: center; gap: 4px; backdrop-filter: blur(4px); z-index: 2;
        }

        .pin img { width: 100%; display: block; min-height: 100px; background: var(--bg-color); object-fit: cover; }
        .pin-tag {
            position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.6);
            color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 6px;
            backdrop-filter: blur(4px); max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .pin-broken {
            width: 100%; aspect-ratio: 1/1; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-sub); font-size: 11px; gap: 6px;
        }

        /* 画板列表 */
        .board-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .b-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column; aspect-ratio: 1 / 1.1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); position: relative; border: 1px solid var(--border-color);
        }
        .b-cover-wrap { flex: 2; position: relative; background: var(--bg-color); overflow: hidden; }
        .b-cover-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .b-card.my-works .b-cover-wrap { background: linear-gradient(135deg, #333 0%, #000 100%); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 32px; }
        .b-info { flex: 1; padding: 10px; display: flex; flex-direction: column; justify-content: center; background: var(--card-bg); }
        .b-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-main); }
        .b-count { font-size: 11px; color: var(--text-sub); }

        /* --- 5. 底部导航 --- */
        .tab-bar {
            height: calc(var(--nav-height) + var(--safe-bottom));
            background: var(--nav-bg); border-top: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            display: flex; position: fixed; bottom: 0; width: 100%; z-index: 30;
            padding-bottom: var(--safe-bottom);
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-sub); font-size: 10px; gap: 4px; transition: 0.2s; cursor: pointer;
        }
        .tab-item i { font-size: 22px; margin-bottom: 2px; }
        .tab-item.active { color: var(--text-main); font-weight: 600; }

        /* --- 6. 设置页 --- */
        .settings-page { padding: 15px; }
        .setting-group { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); }
        .s-title { font-size: 15px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .s-label { font-size: 11px; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        .s-row { margin-bottom: 12px; }
        .s-input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 14px; box-sizing: border-box; background: var(--bg-color); color: var(--text-main); outline: none; transition: border-color 0.2s; }
        .s-input:focus { border-color: var(--accent); }

        .btn-full {
            background: var(--btn-bg); color: var(--btn-text); width: 100%; padding: 14px;
            border-radius: 10px; border: none; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-full:active { opacity: 0.7; }
        .btn-full:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-outline { background: var(--btn-sub-bg); color: var(--btn-sub-text); border: 1px solid var(--border-color); }

        .progress-wrap { margin-top: 12px; display: none; }
        .progress-wrap.show { display: block; }
        .progress-bar-bg { height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }
        .progress-text { font-size: 11px; color: var(--text-sub); margin-top: 6px; text-align: center; }

        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 12px; padding: 4px 10px; border-radius: 20px;
            background: var(--btn-sub-bg); color: var(--text-sub); margin-top: 10px;
        }
        .status-badge.ok { background: rgba(34,197,94,0.1); color: #16a34a; }
        .status-badge.err { background: rgba(239,68,68,0.1); color: #dc2626; }

        /* --- 7. 详情弹窗 --- */
        .detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100; display: none;
            flex-direction: column; animation: fadeIn 0.2s ease-out;
        }
        .detail-img-box { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .detail-img, .detail-video { max-width: 100%; max-height: 100%; object-fit: contain; }
        .detail-bar { background: rgba(20,20,20,0.95); padding: 20px 20px calc(20px + var(--safe-bottom)) 20px; color: #fff; border-top: 1px solid #333; }
        .detail-close {
            position: absolute; top: max(15px, var(--safe-top)); right: 15px;
            width: 40px; height: 40px; background: rgba(255,255,255,0.15);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; z-index: 101; backdrop-filter: blur(4px); font-size: 24px; cursor: pointer;
        }
        .d-prompt { font-size: 14px; color: #ccc; line-height: 1.6; max-height: 150px; overflow-y: auto; margin-bottom: 15px; background: #333; padding: 15px; border-radius: 10px; }

        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .empty-hint { text-align: center; color: var(--text-sub); margin-top: 80px; display: none; }
        .empty-hint i { font-size: 48px; opacity: 0.4; display: block; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div class="mask-overlay" id="mask-overlay" onclick="toggleFilter(false)"></div>

    <div class="filter-panel" id="filter-panel">
        <div class="filter-section">
            <div class="filter-title"><i class="ri-git-branch-line"></i> 模型版本</div>
            <div class="filter-tags" id="filter-version"></div>
        </div>
        <div class="filter-section">
            <div class="filter-title"><i class="ri-aspect-ratio-line"></i> 画面比例</div>
            <div class="filter-tags" id="filter-ratio"></div>
        </div>
        <div class="filter-section">
            <div class="filter-title"><i class="ri-price-tag-3-line"></i> 内容标签</div>
            <div class="filter-tags" id="filter-tags"></div>
        </div>
        <div style="margin-top:25px; display:flex; gap:10px;">
            <button class="btn-full btn-outline" onclick="resetFilters()">重置</button>
            <button class="btn-full" onclick="toggleFilter(false)">确定</button>
        </div>
    </div>

    <div id="page-home" class="page active">
        <div class="top-bar">
            <div class="top-left-btn" id="home-back-btn" onclick="goBackToAll()">
                <i class="ri-arrow-left-line ri-lg"></i>
            </div>
            <span id="page-title">全部采集</span>
            <div class="top-right-group">
                <div class="top-icon-btn" onclick="showSearch()"><i class="ri-search-line"></i></div>
                <div class="top-icon-btn" onclick="toggleFilter(true)"><i class="ri-filter-3-line"></i></div>
            </div>
        </div>
        <div class="content-area">
            <div id="gallery" class="waterfall"></div>
            <div class="empty-hint" id="empty-hint">
                <i class="ri-inbox-2-line"></i>
                暂无内容，请前往「设置」同步数据
            </div>
        </div>
    </div>

    <div id="page-boards" class="page">
        <div class="top-bar">我的画板</div>
        <div class="content-area">
            <div id="board-grid" class="board-grid"></div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <div class="top-bar">设置中心</div>
        <div class="content-area settings-page">

            <div class="setting-group">
                <div class="s-title"><i class="ri-palette-line"></i> 外观设置</div>
                <button class="btn-full btn-outline" id="theme-btn" onclick="toggleTheme()">
                    <i class="ri-moon-line"></i> 切换至深色模式
                </button>
            </div>

            <div class="setting-group">
                <div class="s-title"><i class="ri-cloud-line"></i> 云端数据同步 (V1.0)</div>
                <p style="font-size:13px; color:var(--text-sub); margin: 0 0 15px 0; line-height:1.5;">
                    请填入插件端配置的腾讯云 Bucket，点击拉取即可瞬间同步桌面端的所有最新灵感。
                </p>
                <div class="s-row">
                    <div class="s-label">Bucket 名称</div>
                    <input id="cos-bucket" class="s-input" placeholder="my-bucket-1234567890" autocomplete="off">
                </div>
                <div class="s-row">
                    <div class="s-label">地域 (Region)</div>
                    <input id="cos-region" class="s-input" placeholder="ap-guangzhou" autocomplete="off">
                </div>

                <div class="progress-wrap" id="cos-progress-wrap">
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="cos-progress-bar"></div></div>
                    <div class="progress-text" id="cos-progress-text">正在拉取元数据...</div>
                </div>

                <div style="margin-top:5px; margin-bottom:15px; text-align:center;" id="cos-status-area"></div>

                <button class="btn-full" id="cos-sync-btn" onclick="syncFromCOS()">
                    <i class="ri-loop-right-line"></i> 拉取最新云端数据
                </button>
                <div style="height:10px"></div>
                <button class="btn-full btn-outline" style="color:#ff4d4f; border-color: rgba(255,0,0,0.15);" onclick="clearCache()">
                    <i class="ri-delete-bin-line"></i> 清除本地缓存
                </button>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="switchTab('home')">
            <i class="ri-home-4-fill ri-lg"></i>
            <span>首页</span>
        </div>
        <div class="tab-item" onclick="switchTab('boards')">
            <i class="ri-layout-grid-line ri-lg"></i>
            <span>画板</span>
        </div>
        <div class="tab-item" onclick="switchTab('settings')">
            <i class="ri-settings-3-line ri-lg"></i>
            <span>设置</span>
        </div>
    </div>

    <div class="detail-overlay" id="detail-overlay">
        <div class="detail-close" onclick="closeDetail()"><i class="ri-close-line"></i></div>
        <div class="detail-img-box">
            <img id="d-img" class="detail-img" onerror="this.style.display='none'">
            <video id="d-video" class="detail-video" autoplay loop controls playsinline style="display:none;"></video>
        </div>
        <div class="detail-bar">
            <div class="d-prompt" id="d-prompt"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn-full" style="background:#fff; color:#000; flex:2;" onclick="copyPrompt()">
                    <i class="ri-file-copy-line"></i> 复制提示词
                </button>
                <button class="btn-full btn-outline" style="flex:1;" onclick="openOriginal()">
                    <i class="ri-external-link-line"></i> 访问原链
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        let allData = [];
        let currentFilterBoard = 'all';
        let activeFilters = { version: new Set(), ratio: new Set(), tags: new Set() };
        let searchTerm = '';
        let isDarkMode = false;
        let currentDetailItem = null;

        // ==================== 初始化 ====================
        window.onload = () => {
            if (localStorage.getItem('vault_theme') === 'dark') toggleTheme(true);

            const cosCfg = loadCosConfig();
            if (cosCfg.bucket) document.getElementById('cos-bucket').value = cosCfg.bucket;
            if (cosCfg.region) document.getElementById('cos-region').value = cosCfg.region;

            const cached = sessionStorage.getItem('vault_meta_cache') || localStorage.getItem('vault_mobile_data');
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        allData = parsed;
                        updateStatus(`已加载 ${allData.length} 条缓存`, 'ok');
                        initUI();
                        return;
                    }
                } catch (e) {}
            }
            switchTab('settings');
        };

        // ==================== COS V1.0 核心逻辑 ====================
        function loadCosConfig() {
            try { return JSON.parse(localStorage.getItem('vault_cos_config') || '{}'); } 
            catch (e) { return {}; }
        }

        function saveCosConfig(bucket, region) {
            localStorage.setItem('vault_cos_config', JSON.stringify({ bucket, region }));
        }

        // 修复部分缺少 https 的残缺链接
        function fixUrl(url) {
            if (!url) return '';
            if (url.startsWith('http') || url.startsWith('data:') || url.startsWith('blob:')) return url;
            return 'https://' + url;
        }

        async function syncFromCOS() {
            const bucket = document.getElementById('cos-bucket').value.trim();
            const region = document.getElementById('cos-region').value.trim();

            if (!bucket || !region) {
                return setCosStatus('请先填写完整的 Bucket 和 Region', 'err');
            }

            saveCosConfig(bucket, region);

            const btn = document.getElementById('cos-sync-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="ri-loader-4-line"></i> 拉取中...';
            showCosProgress(true, '正在连接腾讯云 COS...');

            try {
                // 🚀 核心更新 1：读取新的大一统元数据文件 unified_meta.json
                const metaUrl = `https://${bucket}.cos.${region}.myqcloud.com/unified_meta.json?t=${Date.now()}`;

                showCosProgress(true, '正在下载最新同步数据...');
                const res = await fetch(metaUrl);

                if (res.status === 403) throw new Error('访问被拒绝(403)。请检查跨域CORS，并将 unified_meta.json 设为公有读。');
                if (res.status === 404) throw new Error('未找到文件(404)。请先在电脑插件端点击「上传同步」。');
                if (!res.ok) throw new Error(`服务器返回错误：${res.status}`);

                showCosProgress(true, '正在解析 1.0 架构数据...');
                const metaObj = await res.json();
                
                // 兼容嵌套的 data 结构
                const rawArr = Array.isArray(metaObj) ? metaObj : (metaObj.data || []);
                
                if (rawArr.length === 0) throw new Error('云端数据为空。');

                // 🚀 核心更新 2：适配 1.0 版本的新字段映射
                allData = rawArr.map(item => ({
                    ...item,
                    mainImage: fixUrl(item.cosThumbUrl) || fixUrl(item.imageUrl) || '',
                    fullImage: fixUrl(item.cosUrl) || fixUrl(item.imageUrl) || '',
                    prompt: item.promptText || item.title || item.originalPrompt || item.prompt || '',
                    favorite: item.isFavorite || item.favorite || false,
                    source: item.source || 'jimeng',
                    videoUrl: item.videoUrl || ''
                }));

                try {
                    sessionStorage.setItem('vault_meta_cache', JSON.stringify(allData));
                } catch (e) {}

                showCosProgress(true, `数据整合完毕！共 ${allData.length} 条`);
                setCosStatus(`✓ 成功同步 ${allData.length} 条数据`, 'ok');

                initUI();
                switchTab('home');

            } catch (e) {
                setCosStatus(e.message, 'err');
                console.error('COS 拉取失败:', e);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="ri-loop-right-line"></i> 拉取最新云端数据';
                setTimeout(() => showCosProgress(false), 2000);
            }
        }

        function showCosProgress(show, text) {
            const wrap = document.getElementById('cos-progress-wrap');
            const textEl = document.getElementById('cos-progress-text');
            wrap.classList.toggle('show', show);
            if (text) textEl.textContent = text;
            const bar = document.getElementById('cos-progress-bar');
            if (show) {
                bar.style.width = '0%';
                setTimeout(() => bar.style.width = '60%', 100);
                setTimeout(() => bar.style.width = '90%', 500);
            } else { bar.style.width = '100%'; }
        }

        function setCosStatus(msg, type) {
            const area = document.getElementById('cos-status-area');
            area.innerHTML = `<span class="status-badge ${type || ''}">${msg}</span>`;
        }

        function clearCache() {
            if (!confirm('确定清空手机端的所有缓存数据？（不会删除云端数据）')) return;
            localStorage.removeItem('vault_mobile_data');
            sessionStorage.removeItem('vault_meta_cache');
            allData = [];
            initUI();
            updateStatus('缓存已清空', '');
        }

        function updateStatus(msg, type) {
            setCosStatus(msg, type);
        }

        // ==================== UI 渲染 ====================
        function initUI() {
            renderGallery();
            renderBoardList();
            renderFilterTags();
        }

        function renderGallery() {
            const container = document.getElementById('gallery');
            container.innerHTML = '';

            let filtered = allData.filter(item => {
                if (currentFilterBoard === 'fav' && !item.favorite) return false;
                if (currentFilterBoard === 'mine' && !item.isMine) return false;
                if (!['all', 'fav', 'mine'].includes(currentFilterBoard) && item.board !== currentFilterBoard) return false;

                if (searchTerm) {
                    const hay = ((item.prompt || '') + ' ' + (item.authorName || '')).toLowerCase();
                    if (!hay.includes(searchTerm.toLowerCase())) return false;
                }

                const tags = item.tags || [];
                if (activeFilters.version.size > 0 && !activeFilters.version.has(item.metaVersion)) return false;
                if (activeFilters.ratio.size > 0 && !activeFilters.ratio.has(item.arType)) return false;
                if (activeFilters.tags.size > 0 && !tags.some(t => activeFilters.tags.has(t))) return false;

                return true;
            });

            const emptyHint = document.getElementById('empty-hint');
            if (filtered.length === 0) { emptyHint.style.display = 'block'; return; }
            emptyHint.style.display = 'none';

            filtered.sort((a, b) => {
                const ta = a.collectTime || '';
                const tb = b.collectTime || '';
                return tb.localeCompare(ta);
            });

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'pin';

                // 🚀 新增：来源颜色顶部条
                const stripe = document.createElement('div');
                stripe.className = `pin-source-stripe stripe-${item.source}`;
                div.appendChild(stripe);

                // 🚀 新增：视频角标
                if (item.videoUrl || (item.metaVersion && item.metaVersion.includes('视频'))) {
                    const vBadge = document.createElement('div');
                    vBadge.className = 'pin-video-badge';
                    vBadge.innerHTML = '<i class="ri-play-circle-fill"></i> 视频';
                    div.appendChild(vBadge);
                }

                const imgSrc = item.mainImage;
                if (imgSrc) {
                    const img = document.createElement('img');
                    img.loading = 'lazy';
                    img.src = imgSrc;
                    img.onerror = function() {
                        this.parentNode.innerHTML += `<div class="pin-broken"><i class="ri-image-line" style="font-size:28px;opacity:0.3"></i><span>资源失效</span></div>`;
                        this.style.display = 'none';
                    };
                    div.appendChild(img);
                } else {
                    div.innerHTML += `<div class="pin-broken"><i class="ri-image-line" style="font-size:28px;opacity:0.3"></i><span>无图片</span></div>`;
                }

                const tag = document.createElement('div');
                tag.className = 'pin-tag';
                tag.textContent = item.board || '默认画板';
                div.appendChild(tag);

                div.onclick = () => openDetail(item);
                container.appendChild(div);
            });
        }

        function renderBoardList() {
            const container = document.getElementById('board-grid');
            container.innerHTML = '';

            const boardCounts = {};
            allData.forEach(i => {
                const b = i.board || '默认画板';
                boardCounts[b] = (boardCounts[b] || 0) + 1;
            });

            const favCount = allData.filter(i => i.favorite).length;
            if (favCount > 0) {
                container.appendChild(createBoardCard('❤️ 我的收藏', favCount, allData.find(i => i.favorite)?.mainImage, false, () => enterBoard('fav', '我的收藏')));
            }

            Object.keys(boardCounts).forEach(b => {
                const coverItem = allData.find(i => (i.board || '默认画板') === b);
                container.appendChild(createBoardCard(b, boardCounts[b], coverItem?.mainImage, false, () => enterBoard(b, b)));
            });
        }

        function createBoardCard(title, count, imgUrl, isMine, onClick) {
            const div = document.createElement('div');
            div.className = `b-card ${isMine ? 'my-works' : ''}`;
            const imgContent = imgUrl ? `<img src="${imgUrl}" loading="lazy" onerror="this.style.display='none'">` : '';
            div.innerHTML = `
                <div class="b-cover-wrap">${imgContent}</div>
                <div class="b-info">
                    <div class="b-title">${title}</div>
                    <div class="b-count">${count} 个灵感</div>
                </div>`;
            div.onclick = onClick;
            return div;
        }

        // ==================== 筛选 ====================
        function renderFilterTags() {
            const sets = { version: new Set(), ratio: new Set(), tags: new Set() };
            allData.forEach(item => {
                if (item.metaVersion) sets.version.add(item.metaVersion);
                if (item.arType) sets.ratio.add(item.arType);
                (item.tags || []).forEach(t => {
                    if (!sets.version.has(t) && !sets.ratio.has(t)) sets.tags.add(t);
                });
            });
            renderChips('filter-version', sets.version, activeFilters.version);
            renderChips('filter-ratio', sets.ratio, activeFilters.ratio);
            renderChips('filter-tags', sets.tags, activeFilters.tags);
        }

        function renderChips(cid, dSet, aSet) {
            const c = document.getElementById(cid);
            c.innerHTML = '';
            Array.from(dSet).sort().forEach(val => {
                if (!val) return;
                const chip = document.createElement('div');
                chip.className = `f-chip ${aSet.has(val) ? 'active' : ''}`;
                chip.textContent = val;
                chip.onclick = () => {
                    if (aSet.has(val)) aSet.delete(val); else aSet.add(val);
                    chip.classList.toggle('active');
                };
                c.appendChild(chip);
            });
        }

        function resetFilters() {
            activeFilters = { version: new Set(), ratio: new Set(), tags: new Set() };
            renderFilterTags();
        }

        // ==================== 交互 ====================
        function enterBoard(boardId, title) {
            currentFilterBoard = boardId;
            document.getElementById('page-title').textContent = title;
            document.getElementById('home-back-btn').style.display = 'flex';
            switchTab('home');
        }

        function goBackToAll() {
            currentFilterBoard = 'all';
            document.getElementById('page-title').textContent = '全部采集';
            document.getElementById('home-back-btn').style.display = 'none';
            renderGallery();
        }

        function switchTab(tabName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + tabName).classList.add('active');

            const names = ['home', 'boards', 'settings'];
            const fillIcons = ['ri-home-4-fill', 'ri-layout-grid-fill', 'ri-settings-3-fill'];
            const lineIcons = ['ri-home-4-line', 'ri-layout-grid-line', 'ri-settings-3-line'];

            document.querySelectorAll('.tab-item').forEach((el, idx) => {
                const isActive = names[idx] === tabName;
                el.classList.toggle('active', isActive);
                el.querySelector('i').className = (isActive ? fillIcons[idx] : lineIcons[idx]) + ' ri-lg';
            });

            if (tabName === 'home') renderGallery();
            if (tabName === 'boards') renderBoardList();
        }

        function toggleFilter(show) {
            document.getElementById('filter-panel').classList.toggle('open', show);
            document.getElementById('mask-overlay').classList.toggle('show', show);
            if (!show) renderGallery();
        }

        function showSearch() {
            const t = prompt('🔍 搜索关键词 (作者/提示词):');
            if (t !== null) {
                searchTerm = t.trim();
                renderGallery();
                const baseTitle = currentFilterBoard === 'all' ? '全部采集' : currentFilterBoard;
                document.getElementById('page-title').textContent = searchTerm ? `搜索: ${searchTerm}` : baseTitle;
            }
        }

        function openDetail(item) {
            currentDetailItem = item;
            const overlay = document.getElementById('detail-overlay');
            overlay.style.display = 'flex';
            
            const img = document.getElementById('d-img');
            const video = document.getElementById('d-video');
            
            // 🚀 新增：视频与图片分离播放逻辑
            if (item.videoUrl) {
                img.style.display = 'none';
                video.style.display = 'block';
                video.src = item.videoUrl;
                video.play().catch(()=>{});
            } else {
                video.style.display = 'none';
                video.pause();
                img.style.display = 'block';
                img.src = item.fullImage || item.mainImage || '';
            }

            document.getElementById('d-prompt').textContent = item.prompt || '暂无提示词';
        }

        function closeDetail() {
            document.getElementById('detail-overlay').style.display = 'none';
            document.getElementById('d-video').pause(); // 关弹窗时停播视频
            currentDetailItem = null;
        }

        function copyPrompt() {
            const text = document.getElementById('d-prompt').textContent;
            if (!text || text === '暂无提示词') return alert('没有可复制的提示词');
            navigator.clipboard.writeText(text).then(() => alert('✅ 已复制！')).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text; document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
                alert('✅ 已复制！');
            });
        }

        function openOriginal() {
            if (!currentDetailItem) return;
            const url = currentDetailItem.originalUrl || currentDetailItem.url || '';
            if (url && url.startsWith('http')) window.open(url, '_blank');
            else alert('没有有效的原始链接');
        }

        // ==================== 主题 ====================
        function toggleTheme(forceDark) {
            const body = document.body;
            const btn = document.getElementById('theme-btn');
            if (forceDark === true || !body.hasAttribute('data-theme')) {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '<i class="ri-sun-line"></i> 切换至白天模式';
                isDarkMode = true;
                localStorage.setItem('vault_theme', 'dark');
            } else {
                body.removeAttribute('data-theme');
                btn.innerHTML = '<i class="ri-moon-line"></i> 切换至深色模式';
                isDarkMode = false;
                localStorage.setItem('vault_theme', 'light');
            }
        }
    </script>
</body>
</html>
